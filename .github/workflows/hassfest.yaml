name: Validate with hassfest
on:
  push:
  pull_request:
  schedule:
    - cron: "0 0 * * *"
jobs:
  validate:
    runs-on: "ubuntu-latest"
    steps:
      - uses: "actions/checkout@v4"
      - name: Prepare structure for hassfest
        run: |
          mkdir -p homeassistant/components
          cp -r custom_components/skydark_calendar homeassistant/components/
      - uses: home-assistant/actions/hassfest@master
